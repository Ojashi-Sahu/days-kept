<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Days Kept</title>
<link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Days%20Kept%22,%22short_name%22:%22Days%20Kept%22,%22display%22:%22standalone%22,%22background_color%22:%22%23F2EDE4%22,%22theme_color%22:%22%23F2EDE4%22}" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Days Kept" />
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    background: #F2EDE4;
    background-image: repeating-linear-gradient(transparent, transparent 39px, #D8CFBE 40px);
    font-family: Georgia, 'Times New Roman', serif;
    color: #2B2620;
    min-height: 100vh;
    padding-bottom: 60px;
  }
  .wrap { width: 100%; max-width: 560px; margin: 0 auto; padding: 40px 22px 80px; }
  .eyebrow {
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    color: #8a7f6a; margin-bottom: 6px;
  }
  h1 { font-size: 28px; font-weight: 400; margin: 0 0 32px; letter-spacing: 0.01em; }
  ul { list-style: none; margin: 0; padding: 0; }
  li {
    display: flex; align-items: center; gap: 14px;
    padding: 13px 0; border-bottom: 1px solid #D8CFBE;
  }
  .daynum { width: 60px; text-align: right; flex-shrink: 0; font-size: 22px; line-height: 1; }
  .daylabel {
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    font-size: 10px; color: #9a8f78; letter-spacing: 0.04em; margin-top: 2px; text-align: right;
  }
  .row-main { flex: 1; min-width: 0; }
  .row-label {
    font-size: 16px; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .row-bottom { display: flex; align-items: center; gap: 8px; }
  .bar-track { flex: 1; height: 3px; background: #E3DBC9; border-radius: 2px; overflow: hidden; }
  .bar-fill { height: 100%; }
  .row-date {
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    font-size: 10.5px; color: #9a8f78; flex-shrink: 0;
  }
  .remove-btn {
    background: none; border: none; color: #B8AC92; cursor: pointer; padding: 6px;
    flex-shrink: 0; display: flex; font-size: 16px; line-height: 1;
  }
  .empty {
    padding: 28px 4px; color: #8a7f6a; font-size: 14.5; line-height: 1.6;
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
  }
  .add-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: none; border: 1px dashed #B8AC92; border-radius: 6px;
    padding: 13px 16px; color: #6b6048;
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    font-size: 14px; cursor: pointer; width: 100%; margin-top: 24px;
  }
  .panel {
    display: flex; flex-direction: column; gap: 10px;
    background: #FAF7F0; border: 1px solid #D8CFBE; border-radius: 6px;
    padding: 16px; margin-top: 24px;
  }
  .panel input {
    font-family: Georgia, 'Times New Roman', serif; font-size: 16px;
    padding: 10px; border: 1px solid #D8CFBE; border-radius: 4px;
    background: #fff; color: #2B2620; outline: none; width: 100%;
  }
  .panel input.err { border-color: #B5562F; }
  .err-box {
    color: #B5562F; font-size: 13.5px; font-weight: bold;
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    background: #FBEFE9; border: 1px solid #E0B6A1; border-radius: 4px; padding: 8px 10px;
  }
  .panel-actions { display: flex; gap: 8px; margin-top: 4px; }
  .btn-primary, .btn-secondary {
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    font-size: 14px; border-radius: 4px; padding: 10px 16px; cursor: pointer;
  }
  .btn-primary { background: #2B2620; color: #F2EDE4; border: none; flex: 1; }
  .btn-secondary { background: none; color: #6b6048; border: 1px solid #D8CFBE; }
  .status {
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    font-size: 11px; color: #b0a48c; margin-top: 18px; text-align: center;
  }
  .sync-link {
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    font-size: 11.5px; color: #9a8f78; text-align: center;
    margin-top: 22px; cursor: pointer; text-decoration: underline;
    text-underline-offset: 2px;
  }
  .google-btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    background: #fff; border: 1px solid #D8CFBE; border-radius: 4px;
    padding: 10px 16px; cursor: pointer; width: 100%; margin-top: 24px;
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    font-size: 14px; color: #2B2620;
  }
  .user-bar {
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    font-size: 12px; color: #8a7f6a; display: flex;
    justify-content: space-between; align-items: center; margin-bottom: 28px;
  }
  .sign-out {
    cursor: pointer; text-decoration: underline; text-underline-offset: 2px;
  }
</style>
</head>
<body>
<div class="wrap">
  <div id="userBar"></div>
  <div class="eyebrow" id="todayLabel"></div>
  <h1>Days kept</h1>
  <div id="listArea"></div>
  <div id="formArea"></div>
  <div id="syncArea"></div>
  <div class="status" id="statusLine"></div>
</div>

<script>
// ---------- Google Sign-In + Drive appdata storage ----------
const CLIENT_ID = "389257899994-mpiqan4i3abjparq58uaj3chc045dmbe.apps.googleusercontent.com";
const DRIVE_FILE_NAME = "days-kept.json";
const SCOPES = "https://www.googleapis.com/auth/drive.appdata";

let accessToken = null;
let driveFileId = null;
let currentUser = null;

function renderUserBar() {
  const bar = document.getElementById("userBar");
  if (currentUser) {
    bar.innerHTML = `<div class="user-bar"><span>${currentUser}</span><span class="sign-out" id="signOutBtn">sign out</span></div>`;
    document.getElementById("signOutBtn").onclick = signOut;
  } else {
    bar.innerHTML = "";
  }
}

function signOut() {
  accessToken = null;
  driveFileId = null;
  currentUser = null;
  entries = [];
  renderUserBar();
  renderSignInButton();
  render();
}

function renderSignInButton() {
  const area = document.getElementById("syncArea");
  if (accessToken) { area.innerHTML = ""; return; }
  area.innerHTML = `<button class="google-btn" id="signInBtn">
    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-3.58-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    Sign in with Google
  </button>`;
  document.getElementById("signInBtn").onclick = signIn;
}

function signIn() {
  const client = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: async (response) => {
      if (response.error) { setStatus("Sign-in failed: " + response.error); return; }
      accessToken = response.access_token;
      currentUser = "signed in";
      renderUserBar();
      renderSignInButton();
      setStatus("Loading your dates…");
      entries = await loadEntries();
      setStatus("");
      render();
    },
  });
  client.requestAccessToken();
}

async function getDriveFileId() {
  if (driveFileId) return driveFileId;
  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name='${DRIVE_FILE_NAME}'&fields=files(id)`,
    { headers: { Authorization: "Bearer " + accessToken } }
  );
  const data = await res.json();
  if (data.files && data.files.length > 0) {
    driveFileId = data.files[0].id;
    return driveFileId;
  }
  return null;
}

async function loadEntries() {
  if (!accessToken) return [];
  try {
    const fileId = await getDriveFileId();
    if (!fileId) return [];
    const res = await fetch(
      `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,
      { headers: { Authorization: "Bearer " + accessToken } }
    );
    const data = await res.json();
    return data.entries || [];
  } catch (e) {
    setStatus("Couldn't load from Drive — working offline.");
    return [];
  }
}

async function saveEntries(entries) {
  if (!accessToken) return;
  try {
    let fileId = await getDriveFileId();
    const body = JSON.stringify({ entries });
    if (fileId) {
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
        method: "PATCH",
        headers: { Authorization: "Bearer " + accessToken, "Content-Type": "application/json" },
        body
      });
    } else {
      const meta = await fetch("https://www.googleapis.com/drive/v3/files", {
        method: "POST",
        headers: { Authorization: "Bearer " + accessToken, "Content-Type": "application/json" },
        body: JSON.stringify({ name: DRIVE_FILE_NAME, parents: ["appDataFolder"] })
      });
      const metaData = await meta.json();
      driveFileId = metaData.id;
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`, {
        method: "PATCH",
        headers: { Authorization: "Bearer " + accessToken, "Content-Type": "application/json" },
        body
      });
    }
    setStatus("");
  } catch (e) {
    setStatus("Couldn't save to Drive.");
  }
}

function setStatus(msg) {
  document.getElementById("statusLine").textContent = msg;
}

// ---------- App logic ----------
let entries = [];
let showForm = false;
let pendingError = "";

function daysBetween(a, b) {
  const aa = new Date(a.getFullYear(), a.getMonth(), a.getDate());
  const bb = new Date(b.getFullYear(), b.getMonth(), b.getDate());
  return Math.round((bb - aa) / 86400000);
}

function formatDate(d) {
  return d.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
}

function render() {
  const now = new Date();
  document.getElementById("todayLabel").textContent =
    now.toLocaleDateString(undefined, { weekday: "long", month: "long", day: "numeric" });

  const sorted = [...entries].sort((a, b) => {
    const da = daysBetween(now, new Date(a.date + "T00:00:00"));
    const db = daysBetween(now, new Date(b.date + "T00:00:00"));
    const aFuture = da >= 0, bFuture = db >= 0;
    if (aFuture && bFuture) return da - db;
    if (!aFuture && !bFuture) return db - da;
    return aFuture ? -1 : 1;
  });

  const listArea = document.getElementById("listArea");
  if (sorted.length === 0) {
    listArea.innerHTML = `<div class="empty">Nothing marked yet. Add a date worth watching — a deadline, a trip, a birthday — and it'll sit here counting down, so the distance to it stays visible instead of vague.</div>`;
  } else {
    listArea.innerHTML = `<ul>${sorted.map(rowHtml).join("")}</ul>`;
    sorted.forEach(entry => {
      const btn = document.getElementById("rm-" + entry.id);
      if (btn) btn.onclick = () => removeEntry(entry.id);
    });
  }

  renderForm();
}

function rowHtml(entry) {
  const now = new Date();
  const target = new Date(entry.date + "T00:00:00");
  const d = daysBetween(now, target);
  const isPast = d < 0;
  const isToday = d === 0;
  const accent = isPast ? "#9a9183" : (d > 0 && d <= 7) || isToday ? "#B5562F" : "#6B7860";

  const created = entry.createdAt ? new Date(entry.createdAt) : null;
  const totalSpan = created ? Math.max(daysBetween(created, target), 1) : 90;
  const elapsed = created ? daysBetween(created, now) : 90 - Math.max(d, 0);
  const progress = isPast ? 1 : Math.min(Math.max(elapsed / totalSpan, 0), 1);

  return `
  <li>
    <div>
      <div class="daynum" style="color:${isToday ? '#B5562F' : '#2B2620'}">${isPast ? '+' + Math.abs(d) : d}</div>
      <div class="daylabel">${d === 0 ? 'today' : isPast ? 'days past' : 'days'}</div>
    </div>
    <div class="row-main">
      <div class="row-label" title="${escapeHtml(entry.label)}">${escapeHtml(entry.label)}</div>
      <div class="row-bottom">
        <div class="bar-track"><div class="bar-fill" style="width:${progress * 100}%; background:${accent}; opacity:${isPast ? 0.4 : 0.85}"></div></div>
        <span class="row-date">${formatDate(target)}</span>
      </div>
    </div>
    <button class="remove-btn" id="rm-${entry.id}" aria-label="Remove ${escapeHtml(entry.label)}">✕</button>
  </li>`;
}

function escapeHtml(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function renderForm() {
  const formArea = document.getElementById("formArea");
  if (!showForm) {
    formArea.innerHTML = `<button class="add-btn" id="openFormBtn">+ Mark a date</button>`;
    document.getElementById("openFormBtn").onclick = () => { showForm = true; pendingError = ""; render(); focusLabel(); };
    return;
  }
  formArea.innerHTML = `
    <div class="panel">
      <input type="text" id="labelInput" placeholder="What are you counting toward?" maxlength="80" class="${pendingError && !currentLabel().trim() ? 'err' : ''}" value="${escapeHtml(currentLabel())}" />
      <input type="date" id="dateInput" class="${pendingError && !currentDate() ? 'err' : ''}" value="${currentDate()}" />
      ${pendingError ? `<div class="err-box">${pendingError}</div>` : ""}
      <div class="panel-actions">
        <button class="btn-primary" id="submitBtn">Add to ledger</button>
        <button class="btn-secondary" id="cancelBtn">Cancel</button>
      </div>
    </div>`;
  document.getElementById("labelInput").oninput = (e) => { tempLabel = e.target.value; };
  document.getElementById("dateInput").oninput = (e) => { tempDate = e.target.value; };
  document.getElementById("labelInput").onkeydown = (e) => { if (e.key === "Enter") addEntry(); };
  document.getElementById("dateInput").onkeydown = (e) => { if (e.key === "Enter") addEntry(); };
  document.getElementById("submitBtn").onclick = addEntry;
  document.getElementById("cancelBtn").onclick = () => { showForm = false; pendingError = ""; tempLabel = ""; tempDate = ""; render(); };
}

let tempLabel = "";
let tempDate = "";
function currentLabel() { return tempLabel; }
function currentDate() { return tempDate; }

function focusLabel() {
  setTimeout(() => {
    const el = document.getElementById("labelInput");
    if (el) el.focus();
  }, 0);
}

async function addEntry() {
  if (!tempLabel.trim()) { pendingError = "Give it a name first."; render(); return; }
  if (!tempDate) { pendingError = "Pick a date."; render(); return; }
  const target = new Date(tempDate + "T00:00:00");
  if (isNaN(target.getTime())) { pendingError = "That date didn't parse right."; render(); return; }

  entries.push({
    id: Date.now() + "-" + Math.random().toString(36).slice(2, 7),
    label: tempLabel.trim(),
    date: tempDate,
    createdAt: Date.now()
  });
  tempLabel = ""; tempDate = ""; pendingError = ""; showForm = false;
  render();
  await saveEntries(entries);
}

async function removeEntry(id) {
  entries = entries.filter(e => e.id !== id);
  render();
  await saveEntries(entries);
}

// refresh "today" once a minute
setInterval(render, 60000);

// init
(async () => {
  render();
  renderUserBar();
  renderSignInButton();
})();
</script>
</body>
</html>
